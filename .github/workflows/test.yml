name: Tests

on:
  push:
  pull_request:

jobs:
  argument-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run argument validation tests
        run: bash test/test_argument_validation.sh

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        estimator: [mediapipe, mmposewholebody]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev libgl1

      - name: Run ${{ matrix.estimator }} tests
        run: bash test/test_${{ matrix.estimator }}.sh
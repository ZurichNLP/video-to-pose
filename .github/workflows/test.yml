name: Tests

on:
  push:
  pull_request:

jobs:
  argument-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run argument validation tests
        run: bash test/test_argument_validation.sh

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - estimator: mediapipe
          - estimator: mmposewholebody
            python-version: '3.8'
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        if: matrix.python-version
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev libgl1

      - name: Run ${{ matrix.estimator }} tests
        run: bash test/test_${{ matrix.estimator }}.sh
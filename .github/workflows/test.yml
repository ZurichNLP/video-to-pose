name: Tests

on:
  push:
  pull_request:

jobs:
  argument-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run argument validation tests
        run: bash test/test_argument_validation.sh

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        estimator: [mediapipe, mmposewholebody, openpifpaf, sapiens, sdpose]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        if: matrix.estimator == 'openpifpaf'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache sapiens tools
        if: matrix.estimator == 'sapiens'
        uses: actions/cache@v4
        with:
          path: tools/sapiens
          key: sapiens-${{ runner.os }}-${{ hashFiles('estimators/sapiens/requirements.txt', 'estimators/sapiens/install_sapiens.sh') }}-0.3b

      - name: Run ${{ matrix.estimator }} tests
        run: bash test/test_${{ matrix.estimator }}.sh ${{ matrix.estimator == 'sapiens' && '--model-size 0.3b' || '' }}